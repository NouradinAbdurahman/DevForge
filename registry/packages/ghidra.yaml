license: Apache-2.0
documentation: https://github.com/NationalSecurityAgency/ghidra/wiki
maintainer: DevForgeKit Registry
tags:
  - security
  - reverse-engineering
aliases:
  - ghidra-re
stability: stable
lastVerified: "2026-07-05"
recommendedAlternatives:
  - radare2
platformInstall:
  macos:
    method: brew-cask
    id: ghidra

