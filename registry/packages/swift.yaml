schemaVersion: 1
name: swift
description: The Swift programming language toolchain, provided by Xcode Command Line Tools
category: languages
platforms: [macos]
architectures: [intel, apple-silicon]
install:
  method: shell
  command: xcode-select --install
dependencies: []
conflicts: []
validate: swift --version
versionCommand: swift --version
repair: xcode-select --install
update: xcrun swift update
uninstall:
  method: shell
  command: sudo rm -rf /Library/Developer/CommandLineTools
post_install: []
recommendedAlternatives:
  - kotlin
  - rust
homepage: https://www.swift.org
repository: https://github.com/swiftlang/swift
license: Apache-2.0
documentation: https://www.swift.org/documentation/
maintainer: DevForgeKit Registry
tags: [language, apple, mobile]
aliases: [swift-lang]
stability: stable
lastVerified: '2026-07-05'
