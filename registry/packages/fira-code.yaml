schemaVersion: 1
name: fira-code
description: A monospace font with programming ligatures
category: fonts
platforms:
  - macos
architectures:
  - intel
  - apple-silicon
install:
  method: brew-cask
  id: font-fira-code
dependencies: []
validate: test -n "$(find /Library/Fonts "$HOME/Library/Fonts" -iname '*FiraCode*' -print -quit 2>/dev/null)"
versionCommand: ls ~/Library/Fonts | grep -i 'Fira Code'
repair: brew reinstall --cask font-fira-code
update: brew upgrade --cask font-fira-code
uninstall:
  method: brew-cask
  id: font-fira-code
post_install: []
homepage: https://github.com/tonsky/FiraCode
repository: https://github.com/tonsky/FiraCode
license: OFL-1.1
documentation: https://github.com/tonsky/FiraCode
maintainer: DevForgeKit Registry
tags:
  - font
  - monospace
  - ligatures
aliases:
  - firacode
stability: stable
lastVerified: "2026-07-05"
platformInstall:
  macos:
    method: brew-cask
    id: font-fira-code

