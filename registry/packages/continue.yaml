schemaVersion: 1
name: continue
description: An open-source AI code assistant, installed as a VS Code extension
category: ai
platforms: [macos]
architectures: [intel, apple-silicon, linux]
install:
  method: shell
  command: code --install-extension continue.continue
dependencies:
  - vscode
conflicts: []
validate: code --list-extensions | grep -q continue.continue
versionCommand: continue --version
repair: code --install-extension continue.continue --force
update: code --install-extension continue.continue --force
uninstall:
  method: shell
  command: code --uninstall-extension continue.continue
post_install: []
recommendedAlternatives:
  - aider
  - cursor
homepage: https://continue.dev
repository: https://github.com/continuedev/continue
license: Apache-2.0
documentation: https://docs.continue.dev
maintainer: DevForgeKit Registry
tags: [ai, editor-extension]
aliases: [continue-dev]
stability: stable
lastVerified: '2026-07-05'
