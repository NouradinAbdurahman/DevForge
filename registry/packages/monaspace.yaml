schemaVersion: 1
name: monaspace
description: GitHub's innovative monospaced font superfamily
category: fonts
platforms:
  - macos
architectures:
  - intel
  - apple-silicon
install:
  method: brew-cask
  id: font-monaspace
dependencies: []
validate: test -n "$(find /Library/Fonts "$HOME/Library/Fonts" -iname '*Monaspace*' -print -quit 2>/dev/null)"
versionCommand: ls ~/Library/Fonts | grep -i Monaspace
repair: brew reinstall --cask font-monaspace
update: brew upgrade --cask font-monaspace
uninstall:
  method: brew-cask
  id: font-monaspace
post_install: []
homepage: https://monaspace.githubnext.com
repository: https://github.com/githubnext/monaspace
license: OFL-1.1
documentation: https://github.com/githubnext/monaspace#readme
maintainer: DevForgeKit Registry
tags:
  - font
  - monospace
aliases:
  - monaspace-font
stability: stable
lastVerified: "2026-07-05"
platformInstall:
  macos:
    method: brew-cask
    id: font-monaspace

