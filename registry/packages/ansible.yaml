license: GPL-3.0
documentation: https://docs.ansible.com
maintainer: DevForgeKit Registry
tags: [devops, automation, configuration-management]
aliases: [ansible-core]
stability: stable
lastVerified: '2026-07-05'
platformInstall:
  macos:
    method: brew-formula
    id: ansible
  linux:
    method: apt
    id: ansible
  windows:
    method: winget
    id: Ansible.Ansible
