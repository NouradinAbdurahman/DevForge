schemaVersion: 1
name: ansible
description: An agentless IT automation and configuration management tool
category: devops
platforms: [macos, linux, windows]
architectures: [intel, apple-silicon, linux, x64, arm64]
install:
  method: brew-formula
  id: ansible
dependencies:
  - python
conflicts: []
validate: ansible --version
versionCommand: ansible --version
repair: brew reinstall ansible
