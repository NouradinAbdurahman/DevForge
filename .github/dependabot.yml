version: 2

updates:
  # ---------------------------------------------------------------------
  # GitHub Actions used in .github/workflows/
  # ---------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "NouradinAbdurahman"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  # ---------------------------------------------------------------------
  # CLI (Layer 2) — the main Node.js package
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "NouradinAbdurahman"
    labels:
      - "dependencies"
      - "cli"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      cli:
        patterns:
          - "*"

  # ---------------------------------------------------------------------
  # npm / pnpm - one entry per JS/TS starter template that ships a
  # package.json (Dependabot's "npm" ecosystem understands pnpm lockfiles too)
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/templates/nodejs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "NouradinAbdurahman"
    labels:
      - "dependencies"
      - "templates"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      nodejs-template:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/templates/express"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "NouradinAbdurahman"
    labels:
      - "dependencies"
      - "templates"
    commit-message:
      prefix: "chore"
      include: "scope"
