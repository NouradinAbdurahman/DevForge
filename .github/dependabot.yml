  # ---------------------------------------------------------------------
  # Docker
  # ---------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/templates/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "NouradinAbdurahman"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
