      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "NouradinAbdurahman"
    labels:
      - "dependencies"
      - "templates"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      nextjs-template:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/templates/react"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "NouradinAbdurahman"
    labels:
      - "dependencies"
      - "templates"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      react-template:
        patterns:
