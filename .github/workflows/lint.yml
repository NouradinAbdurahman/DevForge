name: DevForgeKit Lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Shell syntax (bash -n)
        run: |
          shopt -s globstar
          for f in bootstrap.sh devforgekit scripts/*.sh; do
            echo "Checking $f"
            bash -n "$f"
          done

      - name: JSON validity
        run: |
          shopt -s globstar
          for f in **/*.json; do
            [[ "$f" == *node_modules* ]] && continue
            echo "Checking $f"
            jq empty "$f"
          done

      - name: YAML validity
        run: |
          shopt -s globstar nullglob
          for f in **/*.yml **/*.yaml; do
            [[ "$f" == *node_modules* ]] && continue
            echo "Checking $f"
            yq eval '.' "$f" > /dev/null
          done

      - name: Markdown lint
        run: |
          npx --yes markdownlint-cli "**/*.md" --ignore node_modules --ignore cli/node_modules
