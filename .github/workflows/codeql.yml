name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Every Wednesday at 03:00 UTC
    - cron: "0 3 * * 3"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # CodeQL's "javascript" language covers both JavaScript and
        # TypeScript. There is no dedicated CodeQL analyzer for shell,
        # YAML, JSON, or Markdown - those are covered instead by
        # shellcheck.yml and lint.yml.
        language: ["javascript"]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
