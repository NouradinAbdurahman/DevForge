name: DevForge CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Every Wednesday at 03:00 UTC
    - cron: "0 3 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  # Required for the CodeQL action to look up workflow-run metadata when
  # uploading results; without it SARIF upload fails with "Resource not
  # accessible by integration".
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches this repo's actual languages: Bash/shell has no CodeQL
        # analyzer (covered by shellcheck.yml/lint.yml instead), and there
        # is no Ruby, C/C++, Java, or Go source anywhere in this repo.
        # "javascript-typescript" and "actions" are CodeQL's modern
        # unified language identifiers (see github/codeql-action's
        # CHANGELOG, "language aliases" for CodeQL >= 2.14.4).
        language: ["actions", "javascript-typescript", "python"]
    steps:
      - uses: actions/checkout@v7

      # No autobuild step: none of the analyzed languages (GitHub Actions
      # YAML, JS/TS, Python) require a compile step before analysis.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
