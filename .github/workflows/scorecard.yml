name: DevForge Scorecard

on:
  branch_protection_rule:
  schedule:
    # Every Saturday at 02:00 UTC
    - cron: "0 2 * * 6"
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        # Pinned by commit SHA (Scorecard's own "Pinned-Dependencies" check
        # recommends this): the floating "v2" tag was removed upstream -
        # only fully-qualified vX.Y.Z tags exist now.
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
