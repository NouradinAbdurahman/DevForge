name: DevForgeKit Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Dependency Review
        # No floating major tag exists for this action (unlike
        # actions/checkout etc.) - pin the exact release.
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always
