name: ShellCheck

on:
  push:
    paths:
      - "**/*.sh"
      - "bootstrap.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "**/*.sh"
      - "bootstrap.sh"
      - ".github/workflows/shellcheck.yml"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run ShellCheck
        run: |
          shopt -s globstar
          shellcheck -x bootstrap.sh scripts/*.sh
