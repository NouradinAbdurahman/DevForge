name: Bootstrap

on:
  push:
  pull_request:

jobs:
  dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run bootstrap.sh in dry-run mode
        run: |
          chmod +x bootstrap.sh
          ./bootstrap.sh --yes --dry-run

      - name: Upload generated report
        uses: actions/upload-artifact@v4
        with:
          name: system-report
          path: reports/system-report.txt
