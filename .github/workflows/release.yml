name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "$tag" != "$version" ]]; then
            echo "::error::Tag v$tag does not match VERSION file ($version)"
            exit 1
          fi

      - name: Install validation tools
        run: brew install shellcheck yq

      - name: Validate repository
        run: |
          chmod +x scripts/validate.sh
          ./scripts/validate.sh

      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="## [$version]" '
            index($0, ver) == 1 { found=1; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

      - name: Generate health report to attach to the release
        run: |
          chmod +x scripts/report.sh
          ./scripts/report.sh
          cp reports/system-report.txt health-report.txt

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp Brewfile release-assets/Brewfile
          cp README.md release-assets/README.md
          cp CHANGELOG.md release-assets/CHANGELOG.md
          cp VERSION release-assets/VERSION
          cp health-report.txt release-assets/health-report.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            release-assets/Brewfile \
            release-assets/README.md \
            release-assets/CHANGELOG.md \
            release-assets/VERSION \
            release-assets/health-report.txt

      - name: Release summary
        run: |
          {
            echo "## Release $GITHUB_REF_NAME published"
            echo
            echo "Assets attached: Brewfile, README.md, CHANGELOG.md, VERSION, health-report.txt"
            echo
            echo "### Release notes"
            echo
            cat release-notes.md
          } >> "$GITHUB_STEP_SUMMARY"
